      React.createElement("text",{x:(mx-6).toFixed(1),y:(my+14).toFixed(1),fill:"#FF0099",fontSize:"10",fontWeight:"700",fontFamily:"Helvetica Neue,Helvetica,Arial,sans-serif",textAnchor:"middle"},Math.round(mcNow)),
